;--- 2. 动态倍率全局优选 ---
custom_proxy_group=📉 低倍率优选`url-test`((0\.\d+|1)x)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚖️ 标准一倍`url-test`[^0-9]1x`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🚀 高倍率节点`url-test`([2-9]\d*(\.\d+)?x)`http://www.gstatic.com/generate_204`300,,50

;--- 3. 地区细分自动测速组 ---
custom_proxy_group=🇭🇰 香港1x`url-test`(港|HK).*[^0-9]1x`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港高倍`url-test`(港|HK).*([2-9]\d*(\.\d+)?x)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇨🇳 台湾1x`url-test`(台|TW).*[^0-9]1x`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇨🇳 台湾高倍`url-test`(台|TW).*([2-9]\d*(\.\d+)?x)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇯🇵 日本1x`url-test`(日|JP).*[^0-9]1x`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本高倍`url-test`(日|JP).*([2-9]\d*(\.\d+)?x)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇺🇲 美国1x`url-test`(美|US).*[^0-9]1x`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇺🇲 美国高倍`url-test`(美|US).*([2-9]\d*(\.\d+)?x)`http://www.gstatic.com/generate_204`300,,150

custom_proxy_group=🇸🇬 狮城1x`url-test`(新|SG).*[^0-9]1x`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 狮城高倍`url-test`(新|SG).*([2-9]\d*(\.\d+)?x)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🌍 其它地区`url-test`(澳门|MO|英|德|荷|意|法|俄|澳洲|印度|埃及|巴基斯坦|尼日利亚|UK|Germany|Netherlands|Italy|France|Russia|AU|India|Egypt|Pakistan|Nigeria)`http://www.gstatic.com/generate_204`300,,200

;--- 4. 兜底与全局逻辑 ---
custom_proxy_group=❓ 未知/新增地区`select`^(?!.*(港|HK|台|TW|日|JP|美|US|新|SG|澳门|MO|英|德|荷|意|法|俄|澳洲|印度|埃及|巴基斯坦|尼日利亚)).*
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;--- 5. 定义全量选择列表 (供业务组调用) ---
; 这里定义一个宏，方便业务组直接引用所有细分分类
#define ALL_GROUPS []⚖️ 标准一倍`[]📉 低倍率优选`[]🚀 高倍率节点`[]🇭🇰 香港1x`[]🇭🇰 香港高倍`[]🇨🇳 台湾1x`[]🇨🇳 台湾高倍`[]🇯🇵 日本1x`[]🇯🇵 日本高倍`[]🇺🇲 美国1x`[]🇺🇲 美国高倍`[]🇸🇬 狮城1x`[]🇸🇬 狮城高倍`[]🌍 其它地区`[]❓ 未知/新增地区`[]🚀 手动切换`[]DIRECT

;--- 6. 核心节点选择 (包含所有细分) ---
custom_proxy_group=🚀 节点选择`select`ALL_GROUPS

